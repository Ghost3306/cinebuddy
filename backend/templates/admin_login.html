<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#111827,#1f2937,#374151);
        }

        .login-container{
            width:100%;
            max-width:420px;
            background:white;
            padding:40px;
            border-radius:24px;
            box-shadow:0px 10px 35px rgba(0,0,0,0.25);
            animation:fadeIn 0.5s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0px);
            }
        }

        .login-container h1{
            text-align:center;
            margin-bottom:10px;
            color:#111827;
            font-size:34px;
        }

        .login-container p{
            text-align:center;
            color:gray;
            margin-bottom:30px;
            font-size:14px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:bold;
            color:#374151;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border-radius:12px;
            border:1px solid #d1d5db;
            font-size:15px;
            transition:0.3s;
            outline:none;
        }

        .input-group input:focus{
            border-color:#111827;
            box-shadow:0px 0px 0px 4px rgba(17,24,39,0.1);
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#111827;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#000;
            transform:translateY(-2px);
        }

        .footer-text{
            margin-top:20px;
            text-align:center;
            color:gray;
            font-size:13px;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h1>Admin Login</h1>

        <p>Movie Recommendation Dashboard</p>

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">

                <label>Username</label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter username"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >

            </div>

            <button
                type="submit"
                class="login-btn"
            >
                Login
            </button>

        </form>

        <div class="footer-text">
            Secure Admin Access
        </div>

    </div>

</body>

</html>
